<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Bookyou</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <script>
      // Apply the saved/system theme before first paint to avoid a flash of the
      // wrong theme (FOUC). The `theme` key is shared with ThemeService; when it
      // is absent we follow the OS preference. Kept tiny and synchronous on purpose.
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var dark =
            stored === 'dark' ||
            (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
