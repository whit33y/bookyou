<div class="flex flex-col gap-2">
  <p class="text-sm font-medium text-gray-700">{{ label() }}</p>

  <div class="relative inline-block">
    @if (displayUrl()) {
      <img
        [src]="displayUrl()"
        [alt]="label()"
        [class]="containerClass() + ' object-cover border-2 border-gray-200'"
      />
    } @else {
      <div
        [class]="
          containerClass() +
          ' flex items-center justify-center bg-gray-100 border-2 border-dashed border-gray-300'
        "
        aria-hidden="true"
      >
        <svg
          class="h-8 w-8 text-gray-400"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.5"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
          />
        </svg>
      </div>
    }

    <label
      [attr.for]="inputId"
      [class]="
        containerClass() +
        ' absolute inset-0 flex cursor-pointer items-center justify-center bg-black/50 opacity-0 hover:opacity-100 transition-opacity focus-within:opacity-100 focus-within:ring-2 focus-within:ring-indigo-500 focus-within:ring-offset-2'
      "
      [attr.aria-label]="'Zmień ' + label()"
    >
      @if (uploading()) {
        <span class="sr-only">Przesyłanie...</span>
        <svg
          class="h-5 w-5 animate-spin text-white"
          fill="none"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
          ></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
          ></path>
        </svg>
      } @else {
        <span class="text-xs font-medium text-white">Zmień</span>
      }
      <input
        [id]="inputId"
        type="file"
        class="sr-only"
        accept="image/jpeg,image/png,image/webp"
        [disabled]="uploading()"
        (change)="onFileChange($event)"
      />
    </label>
  </div>

  @if (error()) {
    <p class="text-xs text-red-600" role="alert">{{ error() }}</p>
  }

  <p class="text-xs text-gray-400">JPG, PNG lub WebP · maks. 5 MB</p>
</div>
