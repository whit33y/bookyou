<div class="flex min-h-[calc(100vh-10rem)] items-center justify-center px-4">
  <div class="w-full max-w-md space-y-6">
    <h1 class="text-center text-2xl font-bold text-gray-900 dark:text-gray-100">Zaloguj się</h1>

    @if (error) {
      <p class="rounded-md bg-red-50 p-3 text-sm text-red-600 dark:bg-red-500/10 dark:text-red-400">
        {{ error }}
      </p>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300"
          >Email</label
        >
        <input
          id="email"
          type="email"
          formControlName="email"
          [attr.aria-invalid]="
            form.controls.email.touched && form.controls.email.errors ? true : null
          "
          aria-describedby="email-error"
          class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-100"
        />
        @if (form.controls.email.touched && form.controls.email.errors) {
          <p id="email-error" class="mt-1 text-sm text-red-600 dark:text-red-400">
            Podaj prawidłowy adres email.
          </p>
        }
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300"
          >Hasło</label
        >
        <input
          id="password"
          type="password"
          formControlName="password"
          [attr.aria-invalid]="
            form.controls.password.touched && form.controls.password.errors ? true : null
          "
          aria-describedby="password-error"
          class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-100"
        />
        @if (form.controls.password.touched && form.controls.password.errors) {
          <p id="password-error" class="mt-1 text-sm text-red-600 dark:text-red-400">
            Hasło jest wymagane.
          </p>
        }
      </div>

      <button
        type="submit"
        [disabled]="form.invalid || loading"
        class="w-full rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700 disabled:opacity-50"
      >
        {{ loading ? 'Logowanie...' : 'Zaloguj się' }}
      </button>
    </form>

    <p class="text-center text-sm text-gray-600 dark:text-gray-400">
      Nie masz konta?
      <a
        routerLink="/register"
        class="font-medium text-indigo-600 hover:text-indigo-500 dark:text-indigo-400 dark:hover:text-indigo-300"
      >
        Zarejestruj się
      </a>
    </p>
  </div>
</div>
