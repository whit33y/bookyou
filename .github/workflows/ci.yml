name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ESLint + Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate
      - name: Lint backend
        run: npm run lint:ci -w apps/backend
      - name: Lint frontend
        run: npm run lint -w apps/frontend
      - name: Check formatting
        run: npm run format:check

  backend-test:
    name: Backend tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate
      - name: Run backend tests
        run: npm test -w apps/backend

  frontend-test:
    name: Frontend tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: Run frontend tests
        run: npm test -w apps/frontend -- --no-watch

  build:
    name: Build (frontend + backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate
      - name: Build backend
        run: npm run backend:build
      - name: Build frontend
        run: npm run frontend:build
